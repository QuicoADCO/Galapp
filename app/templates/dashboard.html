<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel · Galapp</title>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<!-- ── BARRA LATERAL ── -->
<aside class="sidebar">
    <div class="sidebar-logo">Gal<span>app</span></div>

    <div class="nav-label">Menú</div>
    <button class="nav-btn active" id="nav-surveys" onclick="showSection('surveys', this)">
        <span class="icon">📊</span> Encuestas
    </button>

    <div class="sidebar-footer">
        <div class="user-card">
            <div class="avatar" id="avatar">?</div>
            <div class="user-meta">
                <div class="name" id="sb-username">—</div>
                <div class="role"><span class="role-badge" id="sb-role">—</span></div>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">⎋ Cerrar sesión</button>
    </div>
</aside>

<!-- ── CONTENIDO PRINCIPAL ── -->
<div class="main">

    <!-- BARRA SUPERIOR -->
    <div class="topbar">
        <div class="topbar-left">
            <h1 id="topbar-title">Encuestas</h1>
        </div>
        <div class="live-badge">
            <div class="live-dot"></div>
            Votación en vivo
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="content">

        <!-- ESTADÍSTICAS -->
        <div class="stats">
            <div class="stat-card c1">
                <div class="stat-icon">📋</div>
                <div class="stat-label">Total encuestas</div>
                <div class="stat-value v1" id="st-surveys">—</div>
            </div>
            <div class="stat-card c2">
                <div class="stat-icon">🗳️</div>
                <div class="stat-label">Total opciones</div>
                <div class="stat-value v2" id="st-options">—</div>
            </div>
            <div class="stat-card c4">
                <div class="stat-icon">🛡️</div>
                <div class="stat-label">Rol</div>
                <div class="stat-value v4" id="st-role">—</div>
            </div>
        </div>

        <!-- SECCIÓN ENCUESTAS -->
        <div id="sec-surveys">
            <div class="section-header">
                <div>
                    <div class="section-title">Encuestas activas</div>
                    <div class="section-sub">Selecciona una opción y vota</div>
                </div>
                <a href="/create-survey" class="btn btn-primary btn-sm">+ Nueva encuesta</a>
            </div>
            <div class="surveys-grid" id="surveys-grid">
                <div class="empty">
                    <div class="icon">⏳</div>
                    <h3>Cargando...</h3>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ── NOTIFICACIÓN ── -->
<div class="toast" id="toast"></div>

<script src="/static/dashboard.js"></script>
</body>
</html>
