<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Galapp</title>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
    <div class="sidebar-logo">Gal<span>app</span></div>

    <div class="nav-label">Menu</div>
    <button class="nav-btn active" id="nav-surveys" onclick="showSection('surveys', this)">
        <span class="icon">📊</span> Surveys
    </button>

    <div class="sidebar-footer">
        <div class="user-card">
            <div class="avatar" id="avatar">?</div>
            <div class="user-meta">
                <div class="name" id="sb-username">—</div>
                <div class="role"><span class="role-badge" id="sb-role">—</span></div>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">⎋ Sign out</button>
    </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <h1 id="topbar-title">Surveys</h1>
        </div>
        <div class="live-badge">
            <div class="live-dot"></div>
            Live Voting
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card c1">
                <div class="stat-icon">📋</div>
                <div class="stat-label">Total Surveys</div>
                <div class="stat-value v1" id="st-surveys">—</div>
            </div>
            <div class="stat-card c2">
                <div class="stat-icon">🗳️</div>
                <div class="stat-label">Total Options</div>
                <div class="stat-value v2" id="st-options">—</div>
            </div>
            <div class="stat-card c4">
                <div class="stat-icon">🛡️</div>
                <div class="stat-label">Role</div>
                <div class="stat-value v4" id="st-role">—</div>
            </div>
        </div>

        <!-- SURVEYS SECTION -->
        <div id="sec-surveys">
            <div class="section-header">
                <div>
                    <div class="section-title">Active Surveys</div>
                    <div class="section-sub">Click an option and vote</div>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openModal()">
                    + New Survey
                </button>
            </div>
            <div class="surveys-grid" id="surveys-grid">
                <div class="empty">
                    <div class="icon">⏳</div>
                    <h3>Loading...</h3>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ── CREATE SURVEY MODAL ── -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h2>New Survey</h2>
            <button class="btn-close" onclick="closeModal()">×</button>
        </div>

        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="e.g. Best programming language?" maxlength="200">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="f-desc" placeholder="Optional description..." maxlength="500"></textarea>
        </div>
        <div class="form-group">
            <label>Options * (min. 2)</label>
            <div class="options-list" id="opt-list">
                <div class="option-row">
                    <input type="text" placeholder="Option 1" maxlength="300">
                    <button class="btn-remove" onclick="removeOpt(this)">×</button>
                </div>
                <div class="option-row">
                    <input type="text" placeholder="Option 2" maxlength="300">
                    <button class="btn-remove" onclick="removeOpt(this)">×</button>
                </div>
            </div>
            <button class="btn-add-opt" onclick="addOpt()">+ Add option</button>
        </div>

        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="createSurvey()">Create Survey</button>
        </div>
    </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script src="/static/dashboard.js"></script>
</body>
</html>
