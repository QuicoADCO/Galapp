<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · Galapp</title>
    <link rel="stylesheet" href="/static/register.css">
</head>
<body>
    <div class="register-wrapper">
        <div class="logo">
            <h1>Gal<span>app</span></h1>
            <p>Create your account</p>
        </div>

        <div class="card">
            <h2>Create account</h2>

            <div class="msg" id="msg"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Min. 8 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm password</label>
                    <input id="confirm_password" type="password" name="confirm_password" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn-register">Create account</button>
            </form>
        </div>

        <div class="footer-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>

    <script src="/static/register.js"></script>
</body>
</html>
