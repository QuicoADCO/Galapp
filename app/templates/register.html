<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · Galapp</title>
    <link rel="stylesheet" href="/static/register.css">
</head>
<body>
    <div class="register-wrapper">
        <div class="logo">
            <h1>Gal<span>app</span></h1>
            <p>Crea tu cuenta</p>
        </div>

        <div class="card">
            <h2>Crear cuenta</h2>

            <div class="msg" id="msg"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input id="username" type="text" name="username" placeholder="Elige un nombre de usuario" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input id="email" type="email" name="email" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input id="password" type="password" name="password" placeholder="Mín. 8 caracteres" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmar contraseña</label>
                    <input id="confirm_password" type="password" name="confirm_password" placeholder="Repite la contraseña" required>
                </div>
                <button type="submit" class="btn-register">Crear cuenta</button>
            </form>
        </div>

        <div class="footer-link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </div>
    </div>

    <script src="/static/register.js"></script>
</body>
</html>
