<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Galapp</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="logo">
            <h1>Gal<span>app</span></h1>
            <p>Plataforma de votación en vivo</p>
        </div>

        <div class="card">
            <h2>Iniciar sesión</h2>

            <div class="error-msg" id="error-msg"></div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input id="username" type="text" name="username" placeholder="Introduce tu usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input id="password" type="password" name="password" placeholder="Introduce tu contraseña" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>

        <div class="footer-link">
            ¿No tienes cuenta? <a href="/register">Regístrate</a>
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
