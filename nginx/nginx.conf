events {}

http {

    server_tokens off;

    client_max_body_size 5M;

    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    server {
        listen 80;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options                    "DENY"                     always;
        add_header X-Content-Type-Options             "nosniff"                  always;
        add_header X-XSS-Protection                   "0"                        always;
        add_header Referrer-Policy                    "strict-origin"            always;
        add_header Permissions-Policy                 "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header X-Permitted-Cross-Domain-Policies  "none"                     always;

        # HSTS: once HTTPS is enabled, change to max-age=31536000; includeSubDomains; preload
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # img-src: allow same-origin images + data: URIs (FileReader previews) + blob:
        # connect-src: allow fetch() to same origin
        # form-action / base-uri / frame-ancestors: lock-down injection vectors
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none';"
            always;

        # ── API: no caching of authenticated responses ─────────────────────
        location /api/ {
            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma        "no-cache"                                     always;
        }

        # ── Auth endpoints: extra no-cache ────────────────────────────────
        location /auth/ {
            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma        "no-cache"                                     always;
        }

        # ── Static uploads: long cache, content-type enforced ─────────────
        location /static/uploads/ {
            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            proxy_pass         http://web:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
